<!DOCTYPE html>
<html lang="ps">
<head>
<meta charset="UTF-8">
<title>پښتو ټايپنګ زده کړه</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
text-align:center;
}

h1{margin-top:20px;}

#startBtn{
font-size:32px;
padding:20px 70px;
background:#22c55e;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
margin-top:30px;
}

/* MENU */

#menuBtn{
position:absolute;
top:15px;
right:20px;
font-size:28px;
cursor:pointer;
display:none;
}

#menu{
position:absolute;
top:50px;
right:20px;
width:260px;
background:#1e293b;
border-radius:10px;
padding:15px;
display:none;
max-height:500px;
overflow:auto;
}

.levelBtn{
width:100%;
margin:4px 0;
padding:6px;
background:#334155;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

.stageBtn{
width:100%;
margin:2px 0;
padding:4px;
background:#475569;
border:none;
color:white;
border-radius:5px;
font-size:13px;
cursor:pointer;
}

#resetBtn{
margin-top:10px;
width:100%;
padding:8px;
background:#ef4444;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

/* MAIN */

#main{
display:none;
margin-top:20px;
}

#stageInfo{
font-size:26px;
margin-bottom:10px;
}

.stats{
font-size:24px;
margin:10px;
}

#lessonText{
font-size:70px;
letter-spacing:8px;
margin:30px;
}

#typedText{
font-size:35px;
margin-top:10px;
color:#38bdf8;
}

/* KEYBOARD */

.keyboard{
display:flex;
flex-direction:column;
align-items:center;
gap:8px;
margin-top:20px;
}

.row{
display:flex;
gap:6px;
}

.key{
background:#e5e7eb;
color:black;
padding:12px 16px;
border-radius:6px;
font-size:20px;
min-width:30px;
text-align:center;
}

.key.active{
background:#22c55e;
color:white;
}

.correct{
color:#22c55e;
}

</style>
</head>

<body>

<div id="menuBtn" onclick="toggleMenu()">⋮</div>

<div id="menu">

<div id="levels"></div>

<button id="resetBtn" onclick="resetProgress()">ریسیټ</button>

</div>

<h1>پښتو ټايپنګ زده کړه</h1>

<button id="startBtn" onclick="start()">پیل</button>

<div id="main">

<div id="stageInfo"></div>

<div class="stats">
چټکتیا: <span id="speed">0</span> |
سمون: <span id="accuracy">100</span>٪
</div>

<div id="lessonText"></div>

<div id="typedText"></div>

<input id="input" autofocus style="opacity:0;height:0">

<div class="keyboard" id="keyboard"></div>

</div>

<script>

/* SOUNDS */

const correctSound=new Audio("https://actions.google.com/sounds/v1/foley/keyboard_type_1.ogg")
const wrongSound=new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg")

/* STEP KEYS */

const stageKeys=[

["ش","س","ی","ب","ت","ن","م","ک"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق","ګ","غ"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق","ګ","غ","ظ","ط"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق","ګ","غ","ظ","ط","ز","ړ"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق","ګ","غ","ظ","ط","ز","ړ","ذ"],

["ش","س","ی","ب","ت","ن","م","ک","ل","ا","ر","د","و","ه","ف","ق","ګ","غ","ظ","ط","ز","ړ","ذ"]

]

/* KEYBOARD LAYOUT */

const layout=[

["ض","ص","ث","ق","ف","غ","ع","ه","خ","ح","ج","چ"],

["ش","س","ی","ب","ل","ا","ت","ن","م","ک","ګ"],

["ظ","ط","ز","ر","ذ","د","ړ","و"]

]

/* CREATE KEYBOARD */

const keyboard=document.getElementById("keyboard")

layout.forEach(row=>{

let rowDiv=document.createElement("div")
rowDiv.className="row"

row.forEach(letter=>{

let key=document.createElement("div")

key.className="key"
key.innerText=letter
key.id="key-"+letter

rowDiv.appendChild(key)

})

keyboard.appendChild(rowDiv)

})

/* LESSONS */

let lessons=[]

for(let s=0;s<10;s++){

let level=[]

for(let i=0;i<10;i++){

let line=""

for(let k=0;k<8;k++){

let letter=stageKeys[s][Math.floor(Math.random()*stageKeys[s].length)]

line+=letter+" "

}

level.push(line.trim())

}

lessons.push(level)

}

/* PROGRESS */

let level=localStorage.getItem("level")?parseInt(localStorage.getItem("level")):0
let stage=localStorage.getItem("stage")?parseInt(localStorage.getItem("stage")):0

let text=""
let position=0
let startTime=null
let errors=0
let total=0
let typed=""

const input=document.getElementById("input")

/* START */

function start(){

document.getElementById("startBtn").style.display="none"
document.getElementById("main").style.display="block"
document.getElementById("menuBtn").style.display="block"

createMenu()

loadStage()

}

/* MENU */

function createMenu(){

const levelsDiv=document.getElementById("levels")

levelsDiv.innerHTML=""

for(let l=0;l<10;l++){

let levelBtn=document.createElement("button")

levelBtn.className="levelBtn"
levelBtn.innerText="کچه "+(l+1)

levelBtn.onclick=function(){

let stageList=document.getElementById("stageList"+l)

stageList.style.display=stageList.style.display=="block"?"none":"block"

}

levelsDiv.appendChild(levelBtn)

let stageList=document.createElement("div")
stageList.id="stageList"+l
stageList.style.display="none"

for(let s=0;s<10;s++){

let sBtn=document.createElement("button")

sBtn.className="stageBtn"
sBtn.innerText="مرحله "+(s+1)

sBtn.onclick=function(){

level=l
stage=s

localStorage.setItem("level",level)
localStorage.setItem("stage",stage)

loadStage()

toggleMenu()

}

stageList.appendChild(sBtn)

}

levelsDiv.appendChild(stageList)

}

}

/* LOAD STAGE */

function loadStage(){

text=lessons[stage][level]

position=0
errors=0
total=0
typed=""

startTime=Date.now()

updateStage()

render()

input.focus()

}

/* UPDATE */

function updateStage(){

document.getElementById("stageInfo").innerText="مرحله "+(stage+1)+" | کچه "+(level+1)

}

/* RENDER */

function render(){

let html=""

for(let i=0;i<text.length;i++){

if(i<position) html+=`<span class="correct">${text[i]}</span>`

else if(i==position) html+=`<span style="background:#22c55e;color:white">${text[i]}</span>`

else html+=text[i]

}

document.getElementById("lessonText").innerHTML=html
document.getElementById("typedText").innerText=typed

highlightKey(text[position])

}

/* HIGHLIGHT KEY */

function highlightKey(letter){

document.querySelectorAll(".key").forEach(k=>k.classList.remove("active"))

let key=document.getElementById("key-"+letter)

if(key) key.classList.add("active")

}

/* TYPING */

input.addEventListener("keydown",function(e){

if(e.key==="Backspace"){

if(position>0){

position--
typed=typed.slice(0,-1)

render()

}

return

}

if(!text[position]) return

total++

typed+=e.key

if(e.key===text[position]){

correctSound.currentTime=0
correctSound.play()

position++

}else{

wrongSound.currentTime=0
wrongSound.play()

errors++

}

updateStats()

if(position>=text.length) nextStage()

render()

})

/* NEXT */

function nextStage(){

level++

if(level>=10){

level=0
stage++

}

if(stage>=10){

alert("مبارک! تاسو ټولې مرحلې بشپړې کړې!")

stage=0
level=0

}

localStorage.setItem("stage",stage)
localStorage.setItem("level",level)

loadStage()

}

/* STATS */

function updateStats(){

let time=(Date.now()-startTime)/60000

let wpm=Math.round((position/5)/time)

if(!isFinite(wpm)) wpm=0

document.getElementById("speed").innerText=wpm

let accuracy=Math.max(0,Math.round((1-errors/total)*100))

if(!isFinite(accuracy)) accuracy=100

document.getElementById("accuracy").innerText=accuracy

}

/* MENU */

function toggleMenu(){

let m=document.getElementById("menu")

m.style.display=m.style.display=="block"?"none":"block"

}

/* RESET */

function resetProgress(){

localStorage.clear()

stage=0
level=0

loadStage()

}

document.body.addEventListener("click",()=>input.focus())

</script>

</body>
</html>
